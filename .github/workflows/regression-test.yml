name: ECS Regression Testing

on:
  workflow_call:
    secrets:
      DEV_URL:
        required: true

  workflow_dispatch:

  # Nightly regression execution
  # schedule:
  #   - cron: "0 2 * * *"


permissions:
  contents: read

jobs:
  regression-test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.DEV_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Install Playwright browser
        run: |
          playwright install --with-deps chromium

      - name: Health Check ECS
        run: |
          echo "Testing URL: $BASE_URL"
          curl --fail --retry 5 --retry-delay 10 $BASE_URL

      - name: Run Regression Tests
        run: |
          pytest tests/regression \
          -v \
          --html=regression-report.html \
          --self-contained-html

      - name: Upload Regression Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-report
          path: regression-report.html
          if-no-files-found: warn

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots
          path: screenshots/
          if-no-files-found: warn
